name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build-test-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            make \
            clang-format \
            doxygen \
            graphviz

      - name: Format check
        run: make format

      - name: Clean build
        run: make clean

      - name: Build tests
        run: make tests

      - name: Verify test binary exists
        run: |
          ls -la
          test -f tests_runner || (echo "tests_runner not found" && exit 1)

      - name: Run tests
        run: ./tests_runner

      - name: Generate docs (Doxygen)
        run: |
          cd docs
          doxygen Doxyfile

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy-pages:
    needs: build-test-docs
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4